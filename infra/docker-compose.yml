version: '3.8'

# Uso: docker-compose up -d
# Requiere que apps/web haya sido buildeado: cd apps/web && npm run build

services:

  api:
    build:
      context: ../apps/api
    container_name: lacasita-api
    restart: always
    ports:
      - "3002:3002"
    env_file:
      - ../apps/api/.env
    environment:
      - PORT=3002
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ../apps/web
    container_name: lacasita-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_URL=http://api:3002
    depends_on:
      - api

volumes: {}
